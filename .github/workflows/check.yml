name: Playwright Check

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers (direct)
        run: node node_modules/@playwright/test/cli.js install chromium

      - name: Run tests
        run: node node_modules/@playwright/test/cli.js test example.spec.js
